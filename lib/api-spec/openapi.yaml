            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, verified, rejected, suspended]
        - name: vehicleType
          in: query
          schema:
            type: string
            enum: [car, motorcycle, van, minibus]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VehiclesPage"
    post:
      operationId: createVehicle
