          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTrip
      summary: Update a trip (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"

  /trips/{id}/cancel:
    patch:
      operationId: cancelTrip
      summary: Cancel a trip (admin)
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
