components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    # ─── AUTH ────────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, phone, password]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        phone:
          type: string
        password:
          type: string
          minLength: 8

    LoginInput:
      type: object
      required: [credential, password]
      properties:
        credential:
          type: string
          description: Email or phone
        password:
          type: string

    RefreshTokenInput:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    AuthResponse:
      type: object
      required: [accessToken, refreshToken, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── USER ────────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, phone, role, walletBalance, isVerified, isBlocked, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        avatar:
          type: ["string", "null"]
        role:
          type: string
          enum: [user, driver, admin]
        walletBalance:
          type: number
        isVerified:
          type: boolean
        isBlocked:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserProfileUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string

    AdminUserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        role:
          type: string
          enum: [user, driver, admin]

    UsersPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ─── ROUTE ───────────────────────────────────────────────────────────────
    Route:
      type: object
      required: [id, name, fromLocation, toLocation, estimatedDuration, basePrice, isActive, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        fromLocation:
          type: string
        toLocation:
          type: string
        estimatedDuration:
          type: integer
          description: Duration in minutes
        basePrice:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    RouteInput:
      type: object
      required: [name, fromLocation, toLocation, estimatedDuration, basePrice]
      properties:
        name:
          type: string
        fromLocation:
          type: string
        toLocation:
          type: string
        estimatedDuration:
          type: integer
        basePrice:
          type: number
        isActive:
          type: boolean
          default: true

    RouteUpdate:
      type: object
      properties:
        name:
          type: string
        fromLocation:
          type: string
        toLocation:
          type: string
        estimatedDuration:
          type: integer
        basePrice:
          type: number
        isActive:
          type: boolean

    RoutesPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Route"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Station:
      type: object
      required: [id, routeId, name, latitude, longitude, order]
      properties:
        id:
          type: integer
        routeId:
          type: integer
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        order:
          type: integer

    StationInput:
      type: object
      required: [name, latitude, longitude, order]
      properties:
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        order:
          type: integer

    StationUpdate:
      type: object
      properties:
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        order:
          type: integer

    # ─── TRIP ────────────────────────────────────────────────────────────────
    Trip:
      type: object
      required: [id, routeId, busId, driverId, departureTime, arrivalTime, availableSeats, totalSeats, price, status, createdAt]
      properties:
        id:
          type: integer
        routeId:
          type: integer
        busId:
          type: integer
        driverId:
          type: integer
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        availableSeats:
          type: integer
        totalSeats:
          type: integer
        price:
          type: number
        status:
          type: string
          enum: [scheduled, active, completed, cancelled]
        route:
          $ref: "#/components/schemas/Route"
        bus:
          $ref: "#/components/schemas/Bus"
        driver:
          $ref: "#/components/schemas/Driver"
        createdAt:
          type: string
          format: date-time

    TripInput:
      type: object
      required: [routeId, busId, driverId, departureTime, arrivalTime, price]
      properties:
        routeId:
          type: integer
        busId:
          type: integer
        driverId:
          type: integer
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        price:
          type: number

    TripUpdate:
      type: object
      properties:
        busId:
          type: integer
        driverId:
          type: integer
        departureTime:
          type: string
          format: date-time
        arrivalTime:
          type: string
          format: date-time
        price:
          type: number
        status:
          type: string
          enum: [scheduled, active, completed, cancelled]

    TripsPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ─── BUS ─────────────────────────────────────────────────────────────────
    Bus:
      type: object
      required: [id, plateNumber, capacity, model, isActive, createdAt]
      properties:
        id:
          type: integer
        plateNumber:
          type: string
        capacity:
          type: integer
        model:
          type: string
        currentLatitude:
          type: ["number", "null"]
        currentLongitude:
          type: ["number", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    BusInput:
      type: object
      required: [plateNumber, capacity, model]
      properties:
        plateNumber:
          type: string
        capacity:
          type: integer
        model:
          type: string
        isActive:
          type: boolean
          default: true

    BusUpdate:
      type: object
      properties:
        plateNumber:
          type: string
        capacity:
          type: integer
        model:
          type: string
        isActive:
          type: boolean

    BusesPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Bus"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ─── VEHICLE ─────────────────────────────────────────────────────────────
    Vehicle:
      type: object
      required: [id, driverId, plateNumber, make, model, year, color, vehicleType, status, isActive, createdAt]
      properties:
        id:
          type: integer
        driverId:
          type: integer
        plateNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        vehicleType:
          type: string
          enum: [car, motorcycle, van, minibus]
        status:
          type: string
          enum: [pending, verified, rejected, suspended]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    VehicleInput:
      type: object
      required: [driverId, plateNumber, make, model, year, color, vehicleType]
      properties:
        driverId:
          type: integer
        plateNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        vehicleType:
          type: string
          enum: [car, motorcycle, van, minibus]
        status:
          type: string
          enum: [pending, verified, rejected, suspended]
        isActive:
          type: boolean
          default: true

    VehicleUpdate:
      type: object
      properties:
        plateNumber:
          type: string
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        vehicleType:
          type: string
          enum: [car, motorcycle, van, minibus]
        status:
          type: string
          enum: [pending, verified, rejected, suspended]
        isActive:
          type: boolean

    VehiclesPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Vehicle"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ─── DRIVER ──────────────────────────────────────────────────────────────
    Driver:
      type: object
      required: [id, userId, name, phone, rating, isActive, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        rating:
          type: number
        assignedBusId:
          type: ["integer", "null"]
        currentLatitude:
          type: ["number", "null"]
        currentLongitude:
          type: ["number", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    DriverInput:
      type: object
      required: [name, phone, userId]
      properties:
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        assignedBusId:
          type: integer
        isActive:
          type: boolean
          default: true

    DriverUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        assignedBusId:
          type: ["integer", "null"]
        isActive:
          type: boolean

    DriversPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Driver"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    LocationUpdate:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
        longitude:
          type: number

    # ─── BOOKING ─────────────────────────────────────────────────────────────
    Booking:
      type: object
      required: [id, userId, tripId, seatCount, totalPrice, status, paymentStatus, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        tripId:
          type: integer
        seatCount:
          type: integer
        totalPrice:
          type: number
        status:
          type: string
          enum: [pending, confirmed, cancelled, completed]
        paymentStatus:
          type: string
          enum: [pending, paid, refunded]
        promoCodeId:
          type: ["integer", "null"]
        user:
          $ref: "#/components/schemas/User"
        trip:
          $ref: "#/components/schemas/Trip"
        promoCode:
          $ref: "#/components/schemas/PromoCode"
        createdAt:
          type: string
          format: date-time

    BookingInput:
      type: object
      required: [tripId, seatCount]
      properties:
        tripId:
          type: integer
        seatCount:
          type: integer
          minimum: 1
        promoCode:
          type: string

    BookingsPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Booking"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    # ─── WALLET ──────────────────────────────────────────────────────────────
    Wallet:
      type: object
      required: [balance, userId]
      properties:
        userId:
          type: integer
        balance:
          type: number

    WalletTransaction:
      type: object
      required: [id, userId, amount, type, description, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        amount:
          type: number
        type:
          type: string
          enum: [deposit, payment, refund]
        description:
          type: string
        user:
          $ref: "#/components/schemas/User"
        createdAt:
          type: string
          format: date-time

    WalletTransactionsPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/WalletTransaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    RefundInput:
      type: object
      required: [userId, amount, description]
      properties:
        userId:
          type: integer
        amount:
          type: number
        description:
          type: string

    # ─── PROMO CODE ──────────────────────────────────────────────────────────
    PromoCode:
      type: object
      required: [id, code, discountType, discountValue, isActive, usedCount, createdAt]
      properties:
        id:
          type: integer
        code:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        expiryDate:
          type: ["string", "null"]
          format: date-time
        maxUsage:
          type: ["integer", "null"]
        usedCount:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PromoCodeInput:
      type: object
      required: [code, discountType, discountValue]
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        expiryDate:
          type: string
          format: date-time
        maxUsage:
          type: integer
        isActive:
          type: boolean
          default: true

    PromoCodeUpdate:
      type: object
      properties:
        code:
          type: string
        discountType:
          type: string
          enum: [percentage, fixed]
        discountValue:
          type: number
        expiryDate:
          type: string
          format: date-time
        maxUsage:
          type: integer
        isActive:
          type: boolean

    PromoCodesPage:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PromoCode"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    PromoValidateInput:
      type: object
      required: [code]
      properties:
        code:
          type: string

    # ─── NOTIFICATION ────────────────────────────────────────────────────────
    Notification:
      type: object
      required: [id, userId, title, body, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        title:
          type: string
        body:
          type: string
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    NotificationInput:
      type: object
      required: [userId, title, body]
      properties:
        userId:
          type: integer
        title:
          type: string
        body:
          type: string

    # ─── ANALYTICS ───────────────────────────────────────────────────────────
    Analytics:
      type: object
      required: [totalUsers, activeTrips, totalBookings, totalRevenue, activeBuses, activeDrivers, bookingsByStatus, revenueByDay, recentBookings]
      properties:
        totalUsers:
          type: integer
        activeTrips:
          type: integer
        totalBookings:
          type: integer
        totalRevenue:
          type: number
        activeBuses:
          type: integer
        activeDrivers:
          type: integer
        bookingsByStatus:
          type: object
          properties:
            pending:
              type: integer
            confirmed:
              type: integer
            cancelled:
              type: integer
            completed:
              type: integer
        revenueByDay:
          type: array
          items:
            $ref: "#/components/schemas/RevenueDay"
        recentBookings:
          type: array
          items:
            $ref: "#/components/schemas/Booking"

    RevenueDay:
      type: object
      required: [date, revenue, bookings]
      properties:
        date:
          type: string
        revenue:
          type: number
        bookings:
          type: integer

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    DriverLoginInput:
      type: object
      required: [credential, password]
      properties:
        credential:
          type: string
        password:
          type: string

    DriverProfile:
      type: object
      required: [id, userId, name, phone, rating, isOnline, status, isActive]
      properties:
        id:
          type: integer
        userId:
          type: integer
        name:
          type: string
        phone:
          type: string
        licenseNumber:
          type: string
          nullable: true
        nationalId:
          type: string
          nullable: true
        rating:
          type: number
        assignedBusId:
          type: integer
          nullable: true
        currentLatitude:
          type: number
          nullable: true
        currentLongitude:
          type: number
          nullable: true
        currentSpeed:
          type: number
          nullable: true
        currentHeading:
          type: number
          nullable: true
        isOnline:
          type: boolean
        status:
          type: string
          enum: [offline, online, busy, suspended]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DriverAuthResponse:
      type: object
      required: [accessToken, refreshToken, user, driver]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: "#/components/schemas/User"
        driver:
          $ref: "#/components/schemas/DriverProfile"

    DriverLocationInput:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
        longitude:
          type: number
        speed:
          type: number
          nullable: true
        heading:
          type: number
          nullable: true
        tripId:
          type: integer
          nullable: true

    DriverTripList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        total:
          type: integer

    DriverTripDetail:
      allOf:
        - $ref: "#/components/schemas/Trip"
        - type: object
          properties:
            bookings:
              type: array
              items:
                $ref: "#/components/schemas/Booking"

    DriverCancelTripInput:
      type: object
      required: [reason]
      properties:
        reason:
          type: string

    TripStationList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/TripStationItem"

    TripStationItem:
      type: object
      required: [id, routeId, name, latitude, longitude, order, status]
      properties:
        id:
          type: integer
        routeId:
          type: integer
        name:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        order:
          type: integer
        status:
          type: string
          enum: [pending, arrived, completed]
        expectedPassengers:
          type: integer
        progress:
          $ref: "#/components/schemas/StationProgress"
          nullable: true

    StationProgress:
      type: object
      required: [id, tripId, stationId, status]
      properties:
        id:
          type: integer
        tripId:
          type: integer
        stationId:
          type: integer
        status:
          type: string
          enum: [pending, arrived, completed]
        arrivedAt:
          type: string
          format: date-time
          nullable: true
        completedAt:
          type: string
          format: date-time
          nullable: true

    DriverEarningsSummary:
      type: object
      required: [totalEarned, tripCount, recent]
      properties:
        totalEarned:
          type: number
        tripCount:
          type: integer
        recent:
          type: array
          items:
            $ref: "#/components/schemas/DriverEarning"

    DriverEarningsHistory:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/DriverEarning"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    DriverEarning:
      type: object
      required: [id, driverId, amount, status, date]
      properties:
        id:
          type: integer
        driverId:
          type: integer
        tripId:
          type: integer
          nullable: true
        amount:
          type: number
        status:
          type: string
          enum: [pending, confirmed, paid]
        date:
          type: string
          format: date-time

    NotificationList:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Notification"

    DriverAnalytics:
      type: object
      required: [totalDrivers, onlineDrivers, busyDrivers, suspendedDrivers, totalEarningsPaid, totalTripsCompleted, topEarners, recentEarnings]
      properties:
        totalDrivers:
          type: integer
        onlineDrivers:
          type: integer
        busyDrivers:
          type: integer
        suspendedDrivers:
          type: integer
        totalEarningsPaid:
          type: number
        totalTripsCompleted:
          type: integer
        topEarners:
          type: array
          items:
            type: object
        recentEarnings:
          type: array
          items:
            $ref: "#/components/schemas/DriverEarning"

    LiveDriverList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/LiveDriver"
        total:
          type: integer

    LiveDriver:
      type: object
      required: [id, name, status, isOnline, rating]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        status:
          type: string
          enum: [offline, online, busy, suspended]
        isOnline:
          type: boolean
        rating:
          type: number
        currentLatitude:
          type: number
          nullable: true
        currentLongitude:
          type: number
          nullable: true
        currentSpeed:
          type: number
          nullable: true
        currentHeading:
          type: number
          nullable: true
        assignedBusId:
          type: integer
          nullable: true
        updatedAt:
          type: string
          format: date-time
        activeTrip:
          type: object
          nullable: true
