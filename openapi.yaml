            schema:
              type: object
              required: [userId, amount, description]
              properties:
                userId:
                  type: integer
                amount:
                  type: number
                description:
                  type: string
      responses:
        "200":
          description: Updated balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  walletBalance:
