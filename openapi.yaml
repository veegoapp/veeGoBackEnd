  /payments:
    get:
      tags: [Payments]
      summary: Get own payment history
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: object

  /admin/payments:
    get:
      tags: [Payments]
      summary: List all payments (admin)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: object

  # ── Shuttle Lines ─────────────────────────────────────────────────────────────

  /shuttle/lines:
    get:
      tags: [Shuttle]
      summary: List shuttle lines with upcoming trip counts (public)
      security: []
      responses:
        "200":
          description: Shuttle lines
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object

  /shuttle/lines/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Shuttle]
      summary: Get a shuttle line with upcoming trips (public)
      security: []
      responses:
        "200":
          description: Shuttle line with trips
          content:
            application/json:
              schema:
                type: object

  # ── Bookings ─────────────────────────────────────────────────────────────────

  /bookings:
    get:
      tags: [Bookings]
      summary: List all bookings (admin)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [Bookings]
      summary: Book seats on a shuttle trip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tripId, seatCount, pickupStationId, dropoffStationId]
              properties:
                tripId:
                  type: integer
                seatCount:
                  type: integer
                  minimum: 1
                pickupStationId:
                  type: integer
                dropoffStationId:
                  type: integer
                promoCode:
                  type: string
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: No seats available or validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /bookings/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Bookings]
      summary: Get a specific booking
      responses:
        "200":
          description: Booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /bookings/{id}/cancel:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    patch:
      tags: [Bookings]
      summary: Cancel a booking and refund wallet
      responses:
        "200":
          description: Cancelled booking
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"

  /admin/bookings:
    get:
      tags: [Bookings]
      summary: List all bookings with full details (admin)
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/LimitParam"
        - name: status
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Bookings
          content:
            application/json:
              schema:
                type: object

  # ── Routes ───────────────────────────────────────────────────────────────────

  /routes:
    get:
      tags: [Routes]
      summary: List all shuttle routes (public)
      security: []
      parameters:
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Route list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Route"
                  total:
                    type: integer
    post:
      tags: [Routes]
      summary: Create a route (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, fromLocation, toLocation, basePrice]
              properties:
                name:
