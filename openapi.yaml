          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number

  /wallet/balance:
    get:
      tags: [Wallet]
      summary: Get wallet balance (alias)
      responses:
        "200":
          description: Balance
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: number

  /wallet/transactions:
    get:
