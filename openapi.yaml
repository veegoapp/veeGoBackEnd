  # ── Schedules ────────────────────────────────────────────────────────────────

  /schedules:
    get:
      tags: [Schedules]
      summary: List all schedules with slots and trip stats (admin)
      parameters:
        - name: routeId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Schedule list
          content:
            application/json:
              schema:
                type: object
    post:
      tags: [Schedules]
      summary: Create a schedule and auto-generate trips (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [routeId, effectiveFrom, effectiveTo, slots]
              properties:
                routeId:
                  type: integer
                effectiveFrom:
                  type: string
                  format: date
                effectiveTo:
                  type: string
                  format: date
                defaultCapacity:
                  type: integer
                slots:
                  type: array
                  items:
                    type: object
                    required: [dayOfWeek, departureTime]
                    properties:
                      dayOfWeek:
                        type: integer
                        minimum: 0
                        maximum: 6
                        description: 0=Sunday, 6=Saturday
                      departureTime:
                        type: string
                        example: "07:30"
      responses:
        "201":
          description: Schedule created with trips
          content:
            application/json:
              schema:
                type: object
                properties:
                  schedule:
                    type: object
                  slots:
                    type: array
                    items:
                      type: object
                  tripsCreated:
                    type: integer

  /schedules/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    get:
      tags: [Schedules]
      summary: Get a schedule with slots and trip stats (admin)
      responses:
        "200":
          description: Schedule
          content:
            application/json:
              schema:
                type: object
    patch:
      tags: [Schedules]
      summary: Update schedule metadata — does not regenerate trips (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                effectiveFrom:
                  type: string
                  format: date
                effectiveTo:
                  type: string
                  format: date
                defaultCapacity:
                  type: integer
                isActive:
                  type: boolean
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                type: object
    delete:
      tags: [Schedules]
      summary: Deactivate schedule and cancel future trips (admin)
      responses:
        "200":
          description: Schedule deactivated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  scheduleDeactivated:
                    type: boolean
                  futureTripsCount:
                    type: integer

  /schedules/{id}/generate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
    post:
      tags: [Schedules]
      summary: Re-run trip generation for a schedule (admin, idempotent)
      responses:
        "200":
          description: Trips generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  tripsCreated:
                    type: integer

